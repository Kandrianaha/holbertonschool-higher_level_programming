<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Products</title>
</head>
<body>
    <h1>Produdcts</h1>
    {% if error %}
        <p>{{ error }}</p>
    {% else %}
        <table border="1">
            <tr>
                <th>Name</th>
                <th>Category</th>
                <th>Price</th>
            </tr>
            {% for product in products %}
            <tr>
                <th>{{ product.name }}</th>
                <th>{{ product.category }}</th>
                <th>{{ product.price }}</th>
            </tr>
            {% endfor %}
        </table>
        {% endif %}
</body>
</html>
